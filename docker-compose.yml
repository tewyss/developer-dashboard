services:
  postgres:
    image: postgres:17
    container_name: developer_dashboard_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-developer_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - developer_dashboard_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-developer_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    profiles: ["app"]
    build: .
    container_name: developer_dashboard_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-developer_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PORT: 5432
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  developer_dashboard_data:
