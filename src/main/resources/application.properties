spring.application.name=developer-dashboard

# ---------------------------------------------------------------------------
# DEFAULT PROFILE = H2 (in-memory). The app runs with ZERO external setup.
# To use PostgreSQL instead, start with the "postgres" profile:
#   mvnw spring-boot:run -Dspring-boot.run.profiles=postgres
# or set the env var:  SPRING_PROFILES_ACTIVE=postgres
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:devdashboard;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console at http://localhost:8080/h2-console
# JDBC URL to type in the console: jdbc:h2:mem:devdashboard
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.thymeleaf.cache=false

spring.web.locale=en
spring.web.locale-resolver=fixed

server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false
.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
