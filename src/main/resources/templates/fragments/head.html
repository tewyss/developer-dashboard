<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' · Developer Dashboard' : 'Developer Dashboard'}">
        Developer Dashboard
    </title>

    <script th:inline="none">
        (function () {
            try {
                var stored = localStorage.getItem("theme");
                var theme = stored ||
                    (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
                document.documentElement.setAttribute("data-theme", theme);
            } catch (e) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
            document.documentElement.classList.add("js");
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <script th:src="@{/js/theme.js}" defer></script>
    <script th:src="@{/js/effects.js}" defer></script>
</head>
<body></body>
</html>
