<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Blog form · Admin')}"></head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('blog')}"></div>

    <main class="admin-main">
        <header class="admin-header">
            <a class="back-link" th:href="@{/admin/blog}">&larr; Back to blog</a>
            <h1 th:text="${mode == 'edit'} ? 'Edit post' : 'New post'">Blog form</h1>
        </header>

        <form class="form form-wide"
              th:object="${blogPostForm}"
              th:action="${mode == 'edit'} ? @{/admin/blog/{id}(id=*{id})} : @{/admin/blog}"
              method="post">

            <div class="form-row">
                <label for="title">Title *</label>
                <input type="text" id="title" th:field="*{title}">
                <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">err</span>
            </div>

            <div class="form-row">
                <label for="slug">Slug</label>
                <input type="text" id="slug" th:field="*{slug}" placeholder="auto-generated from title if empty">
                <span class="form-hint">Used in the URL: /blog/<em>your-slug</em>. Leave blank to auto-generate.</span>
            </div>

            <div class="form-row">
                <label for="excerpt">Excerpt</label>
                <textarea id="excerpt" rows="2" th:field="*{excerpt}"
                          placeholder="Short summary shown in the list (optional)"></textarea>
                <span class="field-error" th:if="${#fields.hasErrors('excerpt')}" th:errors="*{excerpt}">err</span>
            </div>

            <div class="form-row">
                <label for="content">Content *</label>
                <textarea id="content" rows="14" th:field="*{content}"></textarea>
                <span class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">err</span>
            </div>

            <div class="form-row form-check">
                <input type="checkbox" id="published" th:field="*{published}">
                <label for="published">Published (visible on the public site)</label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary"
                        th:text="${mode == 'edit'} ? 'Save changes' : 'Create post'">Save</button>
                <a class="btn btn-outline" th:href="@{/admin/blog}">Cancel</a>
            </div>
        </form>
    </main>
</div>
</body>
</html>
