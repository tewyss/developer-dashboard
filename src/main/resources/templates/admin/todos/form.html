<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Task form · Admin')}"></head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('todos')}"></div>

    <main class="admin-main">
        <header class="admin-header">
            <a class="back-link" th:href="@{/admin/todos}">&larr; Back to TODO</a>
            <h1 th:text="${mode == 'edit'} ? 'Edit task' : 'New task'">Task form</h1>
        </header>

        <form class="form form-wide"
              th:object="${todoTaskForm}"
              th:action="${mode == 'edit'} ? @{/admin/todos/{id}(id=*{id})} : @{/admin/todos}"
              method="post">

            <div class="form-row">
                <label for="title">Title *</label>
                <input type="text" id="title" th:field="*{title}">
                <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">err</span>
            </div>

            <div class="form-row">
                <label for="description">Description</label>
                <textarea id="description" rows="5" th:field="*{description}"></textarea>
            </div>

            <div class="form-grid-2">
                <div class="form-row">
                    <label for="status">Status</label>
                    <select id="status" th:field="*{status}">
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}">To do</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="priority">Priority</label>
                    <select id="priority" th:field="*{priority}">
                        <option th:each="p : ${priorities}" th:value="${p}" th:text="${p.label}">Medium</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <label for="deadline">Deadline</label>
                <input type="date" id="deadline" th:field="*{deadline}">
                <span class="form-hint">Optional.</span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary"
                        th:text="${mode == 'edit'} ? 'Save changes' : 'Create task'">Save</button>
                <a class="btn btn-outline" th:href="@{/admin/todos}">Cancel</a>
            </div>
        </form>
    </main>
</div>
</body>
</html>
